<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🦐 새우 색 도감 + 돌연변이 예측기</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f2fbff;
  color:#155209;
  padding:16px;
}

h1{
  text-align:center;
  color:#42aec9;
}

.card{
  background:#fff;
  border:1px solid #258ce0;
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

label{
  display:block;
  margin:10px 0 4px;
  font-size:13px;
}

select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #9ed3e7;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary{
  background:#0aa3d8;
  color:white;
}

.result{
  background:#fff;
  border:1px dashed #2b9981;
  border-radius:12px;
  padding:14px;
}

.chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #cfeaf3;
  margin:4px;
}

.swatch{
  width:18px;
  height:18px;
  border-radius:4px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:8px;
}

.preview{
  height:80px;
  border-radius:8px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.hidden{
  display:none;
}

.modal-card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:320px;
  text-align:center;
}
.footer{

  margin-top:30px;

  padding:20px;

  text-align:center;

  border-top:1px solid #cfeaf3;

  color:#666;

  font-size:14px;

}

.footer a{

  display:inline-block;

  margin-top:8px;

  color:#0aa3d8;

  text-decoration:none;

  font-weight:bold;

}

.footer a:hover{

  text-decoration:underline;

}

</style>
</head>

<body>

<h1>🦐 새우 색 도감 + 돌연변이 예측기</h1>

<div class="card">

  <div class="row">

    <div>

      <label>부모 A - 종류</label>
      <select id="typeA"></select>

      <label>부모 A - 색상</label>
      <select id="colorA"></select>

    </div>

    <div>

      <label>부모 B - 종류</label>
      <select id="typeB"></select>

      <label>부모 B - 색상</label>
      <select id="colorB"></select>

    </div>

  </div>

<div class="button-row">

  <button id="btnPredict" class="primary">
    🎲 예측하기
  </button>

  <button id="btnSwap">
    ↔️ 부모 바꾸기
  </button>

</div>

<div class="card">
  <div id="result" class="result">
    부모를 선택 후 예측하기를 눌러주세요.
  </div>
</div>

<div class="card">
  <div id="catalog" class="grid"></div>
</div>

<div id="modal" class="modal hidden">

  <div class="modal-card">

    <h3>알림</h3>

    <p id="modalText"></p>

    <button id="modalClose">
      확인
    </button>

  </div>

</div>

<footer class="footer">

  <div>
    © Copyright Minhoo Lee
  </div>

  <div>
    <a href="minhoo_story.html">
      앱 스토리 : 민후의 이야기
    </a>
  </div>
<script src="index.js"></script>
</footer>
</body>
</html>
