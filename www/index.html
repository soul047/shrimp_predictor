<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🦐 새우 색 도감 + 돌연변이 예측기</title>
<link rel="manifest" href="manifest.json">

<meta name="theme-color"
      content="#0aa3d8">
<style>

body{
  font-family:Arial,sans-serif;
  background:#f2fbff;
  color:#155209;
  padding:16px;
}

h1{
  text-align:center;
  color:#42aec9;
  margin-bottom:6px;
}

.subtitle{
  text-align:center;
  color:#7fb9c9;
  font-size:13px;
  margin:0 0 16px;
}

.card{
  background:#fff;
  border:1px solid #258ce0;
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

label{
  display:block;
  margin:10px 0 4px;
  font-size:13px;
}

select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #9ed3e7;
}

.button-row{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;
  margin:18px 0;
}

button{
  flex:1 1 220px;
  max-width:280px;
  min-width:200px;
  padding:16px 24px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
  font-size:17px;
  transition:transform .12s ease, box-shadow .12s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(10,163,216,0.25);
}

button:active{
  transform:translateY(0);
}

.primary{
  background:#0aa3d8;
  color:white;
}

#btnSwap{
  background:#fff;
  color:#0aa3d8;
  border:2px solid #0aa3d8;
}

.result{
  background:#fff;
  border:1px dashed #2b9981;
  border-radius:12px;
  padding:14px;
}

.chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #cfeaf3;
  margin:4px;
}

.swatch{
  width:18px;
  height:18px;
  border-radius:4px;
}

.catalog-title{
  text-align:center;
  font-size:14px;
  font-weight:bold;
  color:#42aec9;
  margin:0 0 14px;
}

.species-group{
  margin-bottom:18px;
}

.species-group:last-child{
  margin-bottom:0;
}

.species-title{
  font-size:14px;
  font-weight:bold;
  color:#155209;
  margin:0 0 10px;
  padding-bottom:6px;
  border-bottom:2px dashed #cfeaf3;
}

.pattern-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(84px,1fr));
  gap:10px;
}

.pattern-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  text-align:center;
}

.pattern-swatch{
  width:100%;
  height:50px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,.08);
}

.pattern-label{
  font-size:11px;
  color:#155209;
  line-height:1.2;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.hidden{
  display:none;
}

.modal-card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.footer{
  margin-top:30px;
  padding:20px;
  text-align:center;
  border-top:1px solid #cfeaf3;
  color:#666;
  font-size:14px;
}

.footer a{
  display:inline-block;
  margin-top:8px;
  color:#0aa3d8;
  text-decoration:none;
  font-weight:bold;
}

.footer a:hover{
  text-decoration:underline;
}

@media (max-width:420px){
  button{
    flex:1 1 100%;
    max-width:none;
  }
}

</style>
</head>

<body>

<h1>🦐 새우 색 도감 + 돌연변이 예측기</h1>
<p class="subtitle">✨ 재미를 위한 예측입니다 ✨</p>

<div class="card">

  <div class="row">

    <div>

      <label>부모 A - 종류</label>
      <select id="typeA"></select>

      <label>부모 A - 색상</label>
      <select id="colorA"></select>

    </div>

    <div>

      <label>부모 B - 종류</label>
      <select id="typeB"></select>

      <label>부모 B - 색상</label>
      <select id="colorB"></select>

    </div>

  </div>

  <div class="button-row">

    <button id="btnPredict" class="primary">
      🎲 예측하기
    </button>

    <button id="btnSwap">
      ↔️ 부모 바꾸기
    </button>

  </div>

</div>

<div class="card">
  <div id="result" class="result">
    부모를 선택 후 예측하기를 눌러주세요.
  </div>
</div>

<div class="card">
  <div class="catalog-title">📖 상위종별 색 패턴 도감</div>
  <div id="catalog"></div>
</div>

<div id="modal" class="modal hidden">

  <div class="modal-card">

    <h3>알림</h3>

    <p id="modalText"></p>

    <button id="modalClose">
      확인
    </button>

  </div>

</div>

<footer class="footer">

  <div>
    © Copyright Minhoo Lee
  </div>

  <div>
    <a href="minhoo_story.html">
      앱 스토리 : 민후의 이야기
    </a>
  </div>

</footer>

<script src="index.js"></script>
</body>
</html>
